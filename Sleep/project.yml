name: Sleep
options:
  bundleIdPrefix: com.sleep.app
  deploymentTarget:
    iOS: "16.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Sleep:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Views
      - path: Sources/Views/Components
      - path: Sources/Models
      - path: Sources/Services
      - path: Sources/Extensions
      - path: Sources/Shared
      - path: Resources
        excludes:
          - "*.xcassets"
      - path: Resources/sounds
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleep.app
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Resources/Sleep.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Sleep
        CFBundleName: Sleep
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        NSHealthShareUsageDescription: "Sleep needs access to your health data to analyze your sleep patterns."
        NSHealthUpdateUsageDescription: "Sleep needs permission to save sleep analysis data."
    dependencies:
      - target: Sleep Watch App

  Sleep Watch App:
    type: application
    platform: watchOS
    sources:
      - path: Sources/WatchApp
        type: group
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleep.app.watchkitapp
        ASSETCATALOG_COMPILER_WATCH_APP_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
        ENABLE_PREVIEWS: YES
    info:
      path: Sources/WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Sleep
        CFBundleName: Sleep
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        WKCompanionAppBundleIdentifier: com.sleep.app
        WKWatchKitApp: true
        WKWatchKit2: true
    dependencies:
      - target: Sleep Watch Extension

  Sleep Watch Extension:
    type: app-extension
    platform: watchOS
    sources:
      - path: Sources/WatchAppExtension
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleep.app.watchkitapp.watchkitextension
        TARGETED_DEVICE_FAMILY: "2"
        ENABLE_PREVIEWS: YES
        SKIP_INSTALL: YES
    info:
      path: Sources/WatchAppExtension/Info.plist
      properties:
        CFBundleDisplayName: Sleep Extension
        CFBundleName: Sleep Extension
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSHealthShareUsageDescription: "Sleep needs access to your health data."
        NSExtension:
          NSExtensionPointIdentifier: com.apple.watchkit
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ExtensionDelegate
          NSExtensionAttributes:
            WKAppBundleIdentifier: com.sleep.app.watchkitapp

schemes:
  Sleep:
    build:
      targets:
        Sleep: all
        Sleep Watch App: all
        Sleep Watch Extension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
