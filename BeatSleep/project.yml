name: BeatSleep
options:
  bundleIdPrefix: com.beatsleep
  deploymentTarget:
    iOS: "16.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  BeatSleep:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Views
      - path: Sources/Views/Components
      - path: Sources/Models
      - path: Sources/Services
      - path: Sources/Extensions
        type: group
      - path: Sources/Extensions/Color+Extensions.swift
      - path: Sources/Extensions/String+Localization.swift
      - path: Sources/Shared
      - path: Resources
      - path: Resources/sounds
        type: folder
      - path: Resources/audio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beatsleep.app
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: BeatSleep
        CFBundleName: BeatSleep
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSHealthShareUsageDescription: "BeatSleep needs access to heart rate data to help you track your sleep quality."
        NSHealthUpdateUsageDescription: "BeatSleep needs to save sleep data for analysis."
        NSUserActivityTypes: []

  BeatSleep Watch App:
    type: application
    platform: watchOS
    sources:
      - path: Sources/WatchApp
        excludes:
          - "*.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beatsleep.app.watchkitapp
        ASSETCATALOG_COMPILER_WATCH_APP_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
        ENABLE_PREVIEWS: YES
    info:
      path: Sources/WatchApp/Info.plist
      properties:
        CFBundleDisplayName: BeatSleep
        CFBundleName: BeatSleep
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        WKCompanionAppBundleIdentifier: com.beatsleep.app
        WKWatchKit2App: true
        WkApplicationLanguage: en
    dependencies:
      - target: BeatSleep Watch Extension
        embed: true

  BeatSleep Watch Extension:
    type: app-extension
    platform: watchOS
    sources:
      - path: Sources/WatchAppExtension
      - path: Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beatsleep.app.watchkitapp.watchkitextension
        PRODUCT_NAME: "$(TARGET_NAME)"
        SKIP_INSTALL: YES
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        ASSETCATALOG_COMPILER_WATCH_BACKGROUND_NAME: Watch Background
    info:
      path: Sources/WatchAppExtension/Info.plist
      properties:
        CFBundleDisplayName: BeatSleep Extension
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSHealthShareUsageDescription: "BeatSleep needs access to heart rate data."

schemes:
  BeatSleep:
    build:
      targets:
        BeatSleep: all
        BeatSleep Watch App: all
        BeatSleep Watch Extension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
